<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEASTBIND TRINITY - 統計情報</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-container">
    <header>
        <h1>BEASTBIND TRINITY<br><span>統計情報（全体）</span></h1>
        <div>
            <button class="btn" onclick="window.location.href='index.html'">🏠 トップへ戻る</button>
        </div>
    </header>

    <div class="stats-container">
        <div id="loading-msg" class="panel" style="text-align:center;">
            <p>データを集計中...</p>
        </div>

        <div id="stats-content" style="display:none;">
            <div class="stats-card-grid">
                <!-- スタイル分布 -->
                <div class="panel">
                    <h2>スタイル分布</h2>
                    <div id="style-distribution"></div>
                </div>

                <!-- 基本能力値平均 -->
                <div class="panel">
                    <h2>能力値平均</h2>
                    <div id="ability-averages"></div>
                </div>
            </div>

            <!-- サマリー -->
            <div class="panel" style="margin-top:20px;">
                <h2>サマリー</h2>
                <p id="total-chars-msg"></p>
            </div>
        </div>
    </div>
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=3"></script>
<script src="js/firebase.js?v=3"></script>
<script src="js/stats_page.js?v=3"></script>
</body>
</html>
