<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEASTBIND TRINITY - 統計情報</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-container">
    <header style="flex-wrap: wrap; gap: 15px;">
        <h1>BEASTBIND TRINITY<br><span>統計情報</span></h1>
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <button class="btn" onclick="window.location.href='index.html'">🏠 トップへ戻る</button>
            <button id="theme-toggle" class="btn" title="テーマ切り替え">🌓 テーマ</button>
            <div style="display: flex; gap: 5px; align-items: center; margin-left: 10px;">
                <label for="player-filter" style="font-size: 0.85rem; font-weight: bold;">プレイヤー:</label>
                <select id="player-filter" class="btn" style="padding: 4px 8px; font-size: 0.85rem; background: var(--input-bg); color: var(--text-color); border: 1px solid var(--border-color); cursor: pointer;">
                    <option value="all">すべて</option>
                </select>
            </div>
        </div>
    </header>

    <div class="stats-container">
        <div id="loading-msg" class="panel" style="text-align:center;">
            <p>データを集計中...</p>
        </div>

        <div id="stats-content" style="display:none;">
            <!-- 1. 年齢分布 (折れ線グラフ) -->
            <section class="stats-section">
                <div class="stats-card stats-card-full">
                    <h2>年齢分布</h2>
                    <div id="age-distribution" class="line-graph-container"></div>
                </div>
            </section>

            <!-- 2. 性別比 (帯グラフ) -->
            <section class="stats-section">
                <div class="stats-card stats-card-full">
                    <h2>性別比</h2>
                    <div id="gender-distribution" class="band-graph-container"></div>
                </div>
            </section>

            <!-- 3. スタイル分布 & 各種ランキング -->
            <section class="stats-section">
                <div class="stats-row">
                    <div class="stats-card">
                        <h2>スタイル分布</h2>
                        <div id="style-distribution"></div>
                    </div>
                    <div class="stats-card">
                        <h2>人気ブラッド TOP5</h2>
                        <div id="blood-rankings" class="ranking-list"></div>
                    </div>
                    <div class="stats-card">
                        <h2>人気ルーツ TOP5</h2>
                        <div id="root-rankings" class="ranking-list"></div>
                    </div>
                </div>
            </section>

            <!-- 4. 基本能力平均 & 戦闘能力平均 -->
            <section class="stats-section">
                <div class="stats-row">
                    <div class="stats-card">
                        <h2>基本能力平均・最大値</h2>
                        <div id="ability-averages"></div>
                    </div>
                    <div class="stats-card">
                        <h2>戦闘能力平均・最大値</h2>
                        <div id="combat-averages"></div>
                    </div>
                </div>
            </section>

            <!-- 5. 人気アーツランキング -->
            <section class="stats-section">
                <div class="stats-card stats-card-full">
                    <h2>人気アーツランキング (自動除く)</h2>
                    <div id="arts-rankings" class="ranking-list"></div>
                </div>
            </section>

            <!-- サマリー -->
            <div class="panel summary-panel" style="margin-top:40px; text-align: center; opacity: 0.8;">
                <p id="total-chars-msg" style="font-size: 1.1rem; font-weight: bold;"></p>
            </div>
        </div>
    </div>
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=3"></script>
<script src="js/firebase.js?v=3"></script>
<script src="js/stats_page.js?v=5"></script>
</body>
</html>
